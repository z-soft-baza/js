<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="board.css" type="text/css" rel="stylesheet" >
    <link href="m.css" type="text/css" rel="stylesheet" >
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script>
    <!--<script src="jquery.js"></script>-->
    <script type="text/javascript" src="board.js"></script>
    <script type="text/javascript" src="chess.js"></script>

    <title>jsChess</title>
</head>
<body>

<div class="layout">
    <section class="board-panel card">
        <div class="card-header">
            <h1>jsChess</h1>
            <div id="game_title" class="game-title"></div>
        </div>

        <div class="chess-clock" aria-live="polite">
            <div id="clock_white" class="clock-side active">
                <span class="clock-label">Белые</span>
                <span class="clock-time">05:00</span>
            </div>
            <div id="clock_black" class="clock-side">
                <span class="clock-label">Чёрные</span>
                <span class="clock-time">05:00</span>
            </div>
        </div>

        <div id="wrap">
            <div id="board_top"></div>
            <div id="board">
                ...text...
            </div>
        </div>

        <div id="div_info" class="status-bar">Готов к игре</div>

        <div class="control-group game-log board-log" aria-live="polite">
            <h2>Лог партии</h2>
            <div id="game_log" class="game-log-content">
                <div class="game-log-empty">Ходы ещё не сделаны</div>
            </div>
        </div>
    </section>

    <aside class="controls-panel card">
        <div class="tabs" role="tablist" aria-label="Панель управления">
            <button type="button" class="tab-btn active" role="tab" aria-selected="true" data-tab="tab-games">Игры</button>
            <button type="button" class="tab-btn" role="tab" aria-selected="false" data-tab="tab-settings">Прочее</button>
        </div>

        <div id="tab-games" class="tab-pane active" role="tabpanel">
            <div class="control-group">
                <h2>Игры</h2>
                <div class="inline-controls">
                    <button type="button" class="btn" onclick="get_games_list();">Обновить</button>
                    <button type="button" class="btn btn-primary" onclick="create_new_game();">Создать</button>
                </div>

                <label class="list-title" for="games_list">Открытые партии (двойной клик — подключиться)</label>
                <select id="games_list" size="10" ondblclick="join_game(this.value)">
                    <option>...</option>
                </select>

                <label class="list-title" for="my_games">Мои партии (двойной клик — продолжить)</label>
                <select id="my_games" size="10" ondblclick="resume_game(this.value)">
                    <option>...</option>
                </select>
            </div>
        </div>

        <div id="tab-settings" class="tab-pane" role="tabpanel">
            <div class="control-group">
                <h2>Ход</h2>
                <button type="button" class="btn btn-primary" onclick="save_board();">Закончить ход</button>
                <button type="button" class="btn" onclick="load_board();">Забрать доску</button>
            </div>

            <div class="control-group">
                <h2>Профиль</h2>
                <div class="inline-controls">
                    <input type="text" id="player_name" value="Новый игрок">
                    <button type="button" class="btn" onclick="update_player();">Сохранить</button>
                </div>
            </div>

            <div class="control-group">
                <h2>Звук</h2>
                <label class="sound-toggle" for="sound_enabled">
                    <input type="checkbox" id="sound_enabled" checked>
                    <span>Звук вкл/выкл</span>
                </label>
                <label class="list-title" for="sound_volume">Громкость</label>
                <div class="sound-volume-row">
                    <input type="range" id="sound_volume" min="0" max="100" value="70">
                    <span id="sound_volume_value">70%</span>
                </div>
            </div>
        </div>

    </aside>
</div>

</body>
</html>
